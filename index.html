<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>你好</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    .greeting {
      font-size: clamp(4rem, 25vw, 18rem);
      font-weight: 800;
      color: #fff;
      letter-spacing: 0.02em;
      text-shadow: 0 0 80px rgba(255, 255, 255, 0.15);
    }
  </style>
</head>
<body>
  <h1 class="greeting">你好</h1>
</body>
</html>
